<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        .project-detail-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .project-header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--primary-color);
        }

        .back-button {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background-color: var(--background);
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .project-detail-container h1 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .project-meta {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .project-meta-item {
            display: flex;
            flex-direction: column;
        }

        .project-meta-label {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }

        .project-tags-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Tab Navigation */
        .project-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--background);
            margin: 2rem 0 0 0;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-button:hover {
            color: var(--primary-color);
        }

        .tab-content {
            display: none;
            padding: 2rem 0;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .project-section h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--background);
            padding-bottom: 0.5rem;
        }

        .project-description {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-dark);
        }

        .pdf-viewer {
            width: 100%;
            height: 600px;
            border: 1px solid var(--background);
            border-radius: 4px;
            margin: 1rem 0;
        }

        .code-viewer {
            background-color: #282c34;
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
            max-height: 600px;
            overflow-y: auto;
        }

        .code-viewer pre {
            margin: 0;
            padding: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .code-viewer code {
            font-family: 'Courier New', monospace;
        }

        .code-files-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .code-file-item {
            background-color: var(--background);
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid var(--primary-color);
        }

        .code-file-name {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .file-action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .file-button {
            padding: 0.5rem 1rem;
            background-color: var(--primary-color);
            color: var(--white);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .file-button:hover {
            opacity: 0.9;
        }

        .file-button.secondary {
            background-color: var(--secondary-color);
        }

        .no-content {
            padding: 2rem;
            text-align: center;
            color: var(--text-light);
            background-color: var(--background);
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Portfolio</div>
            <ul class="nav-menu">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="index.html#undergraduate" class="nav-link">Undergraduate Physics</a></li>
                <li><a href="index.html#honours" class="nav-link">Honours Physics</a></li>
                <li><a href="index.html#ancillary" class="nav-link">Ancillary Projects</a></li>
            </ul>
        </div>
    </nav>

    <div class="project-detail-container">
        <a href="index.html" class="back-button">← Back</a>
        
        <div id="project-content" class="loading">
            Loading project details...
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Physics Portfolio. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // Get project from URL parameters
        function getProjectDetails() {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            const index = parseInt(params.get('index'));
            const slug = params.get('slug');

            if (!category || isNaN(index)) {
                document.getElementById('project-content').innerHTML = '<p>Project not found.</p>';
                return;
            }

            const project = projects[category][index];
            if (!project) {
                document.getElementById('project-content').innerHTML = '<p>Project not found.</p>';
                return;
            }

            displayProjectDetail(project, category, slug);
        }

        function displayProjectDetail(project, category, slug) {
            const categoryTitle = category.charAt(0).toUpperCase() + category.slice(1).replace('-', ' ');

            // Build tabs HTML
            let tabsHTML = `
                <div class="project-header">
                    <h1>${project.title}</h1>
                    <div class="project-meta">
                        <div class="project-meta-item">
                            <span class="project-meta-label">Category</span>
                            <span>${categoryTitle}</span>
                        </div>
                    </div>
                </div>

                <div class="project-tabs">
                    <button class="tab-button active" onclick="switchTab(event, 'overview')">📋 Overview</button>
                    ${project.pdf ? '<button class="tab-button" onclick="switchTab(event, \'pdf\')">📄 Lab Report</button>' : ''}
                    ${project.code && project.code.length > 0 ? '<button class="tab-button" onclick="switchTab(event, \'code\')">💻 Code</button>' : ''}
                </div>

                <!-- Overview Tab -->
                <div id="overview" class="tab-content active">
                    <div class="project-section">
                        <h2>Project Overview</h2>
                        <p class="project-description">${project.description}</p>
                    </div>

                    <div class="project-section">
                        <h2>Project Tags</h2>
                        <div class="project-tags-detail">
                            ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;

            // Add PDF Tab if available
            if (project.pdf) {
                tabsHTML += `
                    <div id="pdf" class="tab-content">
                        <div class="project-section">
                            <h2>Lab Report</h2>
                            <iframe class="pdf-viewer" src="${project.pdf}#toolbar=1&navpanes=0" type="application/pdf"></iframe>
                            <div class="file-action-buttons">
                                <a href="${project.pdf}" target="_blank" class="file-button">📖 Open in New Tab</a>
                                <a href="${project.pdf}" download class="file-button secondary">⬇️ Download PDF</a>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Add Code Tab if available
            if (project.code && project.code.length > 0) {
                let codeHTML = `
                    <div id="code" class="tab-content">
                        <div class="project-section">
                            <h2>Source Code</h2>
                            <div class="code-files-list">
                `;
                
                project.code.forEach((file, idx) => {
                    codeHTML += `
                        <div class="code-file-item">
                            <div class="code-file-name">📝 ${file.split('/').pop()}</div>
                            <p style="color: var(--text-light); font-size: 0.9rem; margin: 0.5rem 0;">
                                ${file}
                            </p>
                            <div id="code-viewer-${idx}" class="code-viewer">
                                <pre><code>Loading code...</code></pre>
                            </div>
                            <div class="file-action-buttons">
                                <a href="${file}" target="_blank" class="file-button">👁️ View Raw</a>
                                <a href="${file}" download class="file-button secondary">⬇️ Download</a>
                            </div>
                        </div>
                    `;
                });
                
                codeHTML += `
                            </div>
                        </div>
                    </div>
                `;
                
                tabsHTML += codeHTML;
            }

            document.getElementById('project-content').innerHTML = tabsHTML;
            document.title = `${project.title} - Portfolio`;

            // Load code files
            if (project.code && project.code.length > 0) {
                project.code.forEach((file, idx) => {
                    loadCodeFile(file, idx);
                });
            }
        }

        function loadCodeFile(filePath, index) {
            fetch(filePath)
                .then(response => response.text())
                .then(code => {
                    const codeViewer = document.getElementById(`code-viewer-${index}`);
                    const codeElement = codeViewer.querySelector('code');
                    codeElement.textContent = code;
                    hljs.highlightElement(codeElement);
                })
                .catch(error => {
                    const codeViewer = document.getElementById(`code-viewer-${index}`);
                    const codeElement = codeViewer.querySelector('code');
                    codeElement.textContent = `Error loading file: ${error.message}`;
                });
        }

        function switchTab(event, tabName) {
            // Hide all tabs
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Show selected tab
            const selectedTab = document.getElementById(tabName);
            if (selectedTab) {
                selectedTab.classList.add('active');
            }

            // Add active class to clicked button
            event.target.classList.add('active');
        }

        // Load project details when page loads
        document.addEventListener('DOMContentLoaded', getProjectDetails);
    </script>
</body>
</html>
